<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vite Facet Filter App</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <link rel="stylesheet" href="src/style.css">
  <link rel="stylesheet" href="src/theme.css">
</head>

<body class="bg-base-200 min-h-screen">
  <header class="navbar bg-base-100 shadow-sm sticky top-0 z-50 px-2 sm:px-4 flex-nowrap overflow-hidden">
    <div class="flex-1 min-w-0">
      <h1 id="main-title" class="text-lg sm:text-2xl font-bold text-primary truncate">
        <a href="%BASE_URL%">Product Showcase</a>
      </h1>
    </div>
    <div class="flex-none flex items-center gap-1 sm:gap-4 ml-2">
      <div class="form-control hidden sm:flex">
        <input id="search-input" type="text" placeholder="Search..." class="input input-bordered w-20 sm:w-32 md:w-auto h-8 sm:h-10 text-xs sm:text-base" />
      </div>
      <a href="%BASE_URL%about.html" class="btn btn-ghost btn-xs sm:btn-sm">About</a>
      <div id="product-count-container" class="text-xs sm:text-sm font-medium opacity-70 hidden lg:block whitespace-nowrap"></div>
      <label class="btn btn-ghost btn-xs sm:btn-sm btn-circle swap swap-rotate">
        <input type="checkbox" value="dark" class="theme-controller" id="theme-toggle" />
        <!-- sun icon -->
        <svg class="swap-on fill-current w-4 h-4 sm:w-5 sm:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
        <!-- moon icon -->
        <svg class="swap-off fill-current w-4 h-4 sm:w-5 sm:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
      </label>
    </div>
  </header>

  <main class="container mx-auto py-8 px-4">
    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Sidebar -->
      <aside class="w-full lg:w-1/4">
        <div id="filter-sidebar" class="card bg-base-100 shadow-sm overflow-visible">
          <div class="card-body p-0 py-6">
            <h2 id="filters-label" class="menu-label">Filters</h2>
            <div class="px-6 pb-4">
              <button id="reset-filters-button" class="btn btn-outline btn-primary btn-sm w-full">Reset Filters</button>
            </div>
            <div id="filter-groups-container" class="px-2"></div>
          </div>
        </div>
      </aside>

      <!-- Content -->
      <section class="flex-1">
        <div id="product-list-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <!-- Products will be injected here -->
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="src/main.ts"></script>

  <template id="product-card-template">
    <div class="card bg-base-100 shadow-sm hover:shadow-md transition-shadow">
      <div class="card-body">
        <h2 class="card-title text-lg" data-template-field="name"></h2>
        <div class="text-sm opacity-80 space-y-1">
          <p><strong>Color:</strong> <span data-template-field="color"></span></p>
          <p><strong>Material:</strong> <span data-template-field="material"></span></p>
          <p><strong>Weight:</strong> <span data-template-field="weight"></span> kg</p>
        </div>
        <div class="card-actions justify-between items-center mt-4 pt-4 border-t border-base-200">
          <span class="text-xl font-bold text-secondary" data-template-field="price"></span>
          <button class="btn btn-primary btn-sm btn-circle">+</button>
        </div>
      </div>
    </div>
  </template>

  <footer class="footer footer-center p-10 bg-base-200 text-base-content rounded mt-10">
    <div>
      <p class="font-bold">
        Facet Filter Page.
      </p>
      <p>Source code on <a href="https://github.com/Kugeleis/facet-filter-page" class="link link-hover">GitHub</a>. Version <span id="app-version"></span></p>
    </div>
  </footer>

  <dialog id="product-modal" class="modal">
    <div class="modal-box max-w-2xl">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <h3 class="font-bold text-xl mb-4">Product Details</h3>
      <div id="product-modal-content">
        <!-- Product details will be injected here -->
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>
</body>

</html>
